name: Release

# Fires ONLY when you push a version tag like v1.0.6.
# Runs tests → builds Win/Mac/Linux binaries → publishes to npm + GPR →
# creates a GitHub Release with all assets + checksums.
# You NEVER need to run `npm publish` locally.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────
  # 1. GATE: tests must pass before anything else
  # ──────────────────────────────────────────────
  test:
    name: Test gate
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: ./cloudsync-cli } }
    strategy:
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: cloudsync-cli/package-lock.json
      - run: npm ci
      - run: npm test

  # ──────────────────────────────────────────────
  # 2. BUILD platform binaries (parallel)
  # ──────────────────────────────────────────────
  build-windows:
    name: Windows EXE
    runs-on: windows-latest
    needs: [ test ]
    defaults: { run: { working-directory: ./cloudsync-cli } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: cloudsync-cli/package-lock.json
      - run: npm ci
      - run: npm install -g pkg@5.8.1
      - run: pkg bin/cloudsync.js -t node18-win-x64 -o cloudsync.exe
      - run: .\cloudsync.exe --version
      - run: |
          mkdir release-assets
          copy cloudsync.exe release-assets\
          copy installer\CloudSync-Setup.bat release-assets\
          copy installer\CloudSync.iss release-assets\
          copy README.md release-assets\
          copy LICENSE release-assets\
          Compress-Archive -Path release-assets\* -DestinationPath cloudsync-windows-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            cloudsync-cli/cloudsync.exe
            cloudsync-cli/cloudsync-windows-x64.zip
            cloudsync-cli/installer/CloudSync-Setup.bat
            cloudsync-cli/installer/CloudSync.iss
          retention-days: 7

  build-linux:
    name: Linux binary
    runs-on: ubuntu-latest
    needs: [ test ]
    defaults: { run: { working-directory: ./cloudsync-cli } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: cloudsync-cli/package-lock.json
      - run: npm ci
      - run: npm install -g pkg@5.8.1
      - run: pkg bin/cloudsync.js -t node18-linux-x64 -o cloudsync
      - run: chmod +x cloudsync && ./cloudsync --version
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: cloudsync-cli/cloudsync
          retention-days: 7

  build-macos:
    name: macOS binary
    runs-on: macos-latest
    needs: [ test ]
    defaults: { run: { working-directory: ./cloudsync-cli } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: cloudsync-cli/package-lock.json
      - run: npm ci
      - run: npm install -g pkg@5.8.1
      - run: pkg bin/cloudsync.js -t node18-macos-x64 -o cloudsync
      - run: chmod +x cloudsync && ./cloudsync --version
      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: cloudsync-cli/cloudsync
          retention-days: 7

  # ──────────────────────────────────────────────
  # 3. CREATE GITHUB RELEASE with all binaries
  # ──────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [ build-windows, build-linux, build-macos ]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: windows-build, path: assets/windows }
      - uses: actions/download-artifact@v4
        with: { name: linux-build,   path: assets/linux }
      - uses: actions/download-artifact@v4
        with: { name: macos-build,   path: assets/macos }

      - name: Generate checksums
        run: |
          cd assets
          find . -type f ! -name '*.zip' ! -name '*.bat' ! -name '*.iss' ! -name '*.md' ! -name 'LICENSE' \
            -exec sha256sum {} \; > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: CloudSync-CLI ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            assets/windows/cloudsync.exe
            assets/windows/cloudsync-windows-x64.zip
            assets/windows/CloudSync-Setup.bat
            assets/windows/CloudSync.iss
            assets/linux/cloudsync
            assets/macos/cloudsync
            assets/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────
  # 4. PUBLISH TO NPM
  # ──────────────────────────────────────────────
  publish-npm:
    name: npm publish
    runs-on: ubuntu-latest
    needs: [ test ]
    defaults: { run: { working-directory: ./cloudsync-cli } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: cloudsync-cli/package-lock.json
      - name: Set version from tag
        run: npm pkg set version=${GITHUB_REF_NAME#v}
      - run: npm ci
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ──────────────────────────────────────────────
  # 5. PUBLISH TO GITHUB PACKAGES
  # ──────────────────────────────────────────────
  publish-gpr:
    name: GitHub Packages publish
    runs-on: ubuntu-latest
    needs: [ test ]
    defaults: { run: { working-directory: ./cloudsync-cli } }
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@tech4file'
          cache: npm
          cache-dependency-path: cloudsync-cli/package-lock.json
      - name: Set version and scope
        run: |
          npm pkg set version=${GITHUB_REF_NAME#v}
          npm pkg set name="@tech4file/cloudsync-cli"
      - run: npm ci
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
